<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10131A"/>
      <stop offset="100%" stop-color="#0B0D12"/>
    </linearGradient>
    <linearGradient id="bgLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f7"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="60%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#BF5AF2"/>
      <stop offset="60%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .bg-rect { fill: url(#bg); }
      .border-rect { stroke: rgba(255,255,255,0.08); }
      @media (prefers-color-scheme: light) {
        .bg-rect { fill: url(#bgLight); }
        .border-rect { stroke: rgba(0,0,0,0.08); }
      }
