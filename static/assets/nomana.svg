  <line x1="168" y1="144" x2="168" y2="368" stroke="url(#line)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="168" y1="144" x2="344" y2="368" stroke="url(#line)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="344" y1="144" x2="344" y2="368" stroke="url(#line)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <circle cx="168" cy="144" r="28" fill="url(#glowA)" filter="url(#glow)" opacity="0.5"/>
  <circle cx="168" cy="368" r="28" fill="url(#glowA)" filter="url(#glow)" opacity="0.5"/>
  <circle cx="344" cy="144" r="28" fill="url(#glowB)" filter="url(#glow)" opacity="0.5"/>
