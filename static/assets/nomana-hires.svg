<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nomana">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1F2C"/>
      <stop offset="55%" stop-color="#10131A"/>
      <stop offset="100%" stop-color="#080A0F"/>
    </linearGradient>
    <linearGradient id="bgLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF1F6"/>
    </linearGradient>

    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.78">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="line" gradientUnits="userSpaceOnUse" x1="336" y1="736" x2="688" y2="288">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>

    <radialGradient id="nodeBlue" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#9FD5FF"/>
      <stop offset="35%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#003C85"/>
    </radialGradient>
    <radialGradient id="nodePurple" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#ECC2FF"/>
      <stop offset="35%" stop-color="#BF5AF2"/>
      <stop offset="100%" stop-color="#5A2596"/>
    </radialGradient>

    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5AC8FA" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#0A84FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E0A8FF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#BF5AF2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="haloBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <style>
      .bg-rect { fill: url(#bg); }
      .border-rect { stroke: rgba(255,255,255,0.10); }
      .sheen-rect { fill: url(#sheen); opacity: 1; }
      .vignette-rect { fill: url(#vignette); opacity: 0.55; }
      @media (prefers-color-scheme: light) {
        .bg-rect { fill: url(#bgLight); }
        .border-rect { stroke: rgba(0,0,0,0.10); }
        .sheen-rect { opacity: 0; }
        .vignette-rect { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1024" height="1024" rx="224" class="bg-rect"/>
  <rect width="1024" height="1024" rx="224" class="sheen-rect"/>
  <rect width="1024" height="1024" rx="224" class="vignette-rect"/>
  <rect x="3" y="3" width="1018" height="1018" rx="221" fill="none" class="border-rect" stroke-width="6"/>

  <g filter="url(#haloBlur)" opacity="0.55">
    <circle cx="336" cy="288" r="90" fill="url(#glowBlue)"/>
    <circle cx="336" cy="736" r="90" fill="url(#glowBlue)"/>
    <circle cx="688" cy="288" r="90" fill="url(#glowPurple)"/>
    <circle cx="688" cy="736" r="90" fill="url(#glowPurple)"/>
  </g>

  <g filter="url(#lineGlow)" opacity="0.65">
    <line x1="336" y1="288" x2="688" y2="736" stroke="url(#line)" stroke-width="16" stroke-linecap="round"/>
  </g>
  <line x1="336" y1="288" x2="688" y2="736" stroke="url(#line)" stroke-width="12" stroke-linecap="round" opacity="0.92"/>

  <g filter="url(#softShadow)" opacity="0.55">
    <circle cx="336" cy="294" r="42" fill="#000"/>
    <circle cx="336" cy="742" r="42" fill="#000"/>
    <circle cx="688" cy="294" r="42" fill="#000"/>
    <circle cx="688" cy="742" r="42" fill="#000"/>
  </g>

  <g>
    <circle cx="336" cy="288" r="42" fill="url(#nodeBlue)"/>
    <circle cx="336" cy="288" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="324" cy="274" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="318" cy="270" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <g>
    <circle cx="336" cy="736" r="42" fill="url(#nodeBlue)"/>
    <circle cx="336" cy="736" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="324" cy="722" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="318" cy="718" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <g>
    <circle cx="688" cy="288" r="42" fill="url(#nodePurple)"/>
    <circle cx="688" cy="288" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="676" cy="274" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="670" cy="270" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <g>
    <circle cx="688" cy="736" r="42" fill="url(#nodePurple)"/>
    <circle cx="688" cy="736" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="676" cy="722" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="670" cy="718" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
