  <rect x="522" y="342" width="140" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="522" y="386" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="25" letter-spacing="6" dominant-baseline="alphabetic" fill="#B6BDCC">INNOVATIVE&#160;&#160;DEVELOPMENT</text>
