    <circle cx="1120" cy="220" r="1.5"/>
    <circle cx="940" cy="220" r="1"/>
    <circle cx="1060" cy="80" r="1.5"/>
    <circle cx="60" cy="500" r="1.5"/>
    <circle cx="120" cy="560" r="2"/>
