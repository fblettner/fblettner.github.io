      <stop offset="55%" stop-color="#10131A"/>
      <stop offset="100%" stop-color="#070A10"/>
    </linearGradient>
    <radialGradient id="atmoBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0A84FF" stop-opacity="0.10"/>
