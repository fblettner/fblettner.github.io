      <line x1="336" y1="288" x2="688" y2="736" stroke="url(#line)" stroke-width="18" stroke-linecap="round"/>
    </g>
    <line x1="336" y1="288" x2="688" y2="736" stroke="url(#line)" stroke-width="14" stroke-linecap="round"/>

    <g filter="url(#nodeShadow)" opacity="0.30">
      <circle cx="336" cy="294" r="44" fill="#000"/>
      <circle cx="336" cy="742" r="44" fill="#000"/>
      <circle cx="688" cy="294" r="44" fill="#000"/>
      <circle cx="688" cy="742" r="44" fill="#000"/>
    </g>

    <g>
      <circle cx="336" cy="288" r="42" fill="url(#nodeBlue)"/>
      <circle cx="336" cy="288" r="42" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
      <ellipse cx="324" cy="274" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
      <circle cx="318" cy="270" r="3.5" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <g>
      <circle cx="336" cy="736" r="42" fill="url(#nodeBlue)"/>
      <circle cx="336" cy="736" r="42" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
      <ellipse cx="324" cy="722" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
      <circle cx="318" cy="718" r="3.5" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <g>
      <circle cx="688" cy="288" r="42" fill="url(#nodePurple)"/>
      <circle cx="688" cy="288" r="42" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
      <ellipse cx="676" cy="274" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
      <circle cx="670" cy="270" r="3.5" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <g>
      <circle cx="688" cy="736" r="42" fill="url(#nodePurple)"/>
      <circle cx="688" cy="736" r="42" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
      <ellipse cx="676" cy="722" rx="14" ry="9" fill="#FFFFFF" opacity="0.55"/>
      <circle cx="670" cy="718" r="3.5" fill="#FFFFFF" opacity="0.9"/>
