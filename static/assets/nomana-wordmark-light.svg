<svg viewBox="0 0 1280 384" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nomana">
  <defs>
    <linearGradient id="line" gradientUnits="userSpaceOnUse" x1="336" y1="736" x2="688" y2="288">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <radialGradient id="nodeBlue" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#7FC2FF"/>
      <stop offset="40%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#003F8C"/>
    </radialGradient>
    <radialGradient id="nodePurple" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#E0A8FF"/>
      <stop offset="40%" stop-color="#BF5AF2"/>
      <stop offset="100%" stop-color="#6E2EAE"/>
    </radialGradient>
    <filter id="lineSoftGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
