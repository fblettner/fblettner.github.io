  <text x="312" y="214" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="148" letter-spacing="-3" dominant-baseline="alphabetic" class="wm-text">Nomana-IT</text>
  <rect x="314" y="238" width="132" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="314" y="284" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="26" letter-spacing="6" dominant-baseline="alphabetic" class="wm-sub">INNOVATIVE&#160;&#160;DEVELOPMENT</text>
